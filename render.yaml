services:
  - type: web
    name: secure-auth-portal
    env: node
    plan: free
    buildCommand: npx prisma generate && npx prisma migrate deploy && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: secure-auth-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: EMAIL_SERVER_USER
        sync: false
      - key: EMAIL_SERVER_PASSWORD
        sync: false
      - key: EMAIL_SERVER_HOST
        sync: false
      - key: EMAIL_SERVER_PORT
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: secure-auth-db
    databaseName: auth_portal_db
    user: auth_user
    plan: free
